---
name: Codebase Style
permissions:
    contents: read
    pull-requests: read

on:
    push:
        branches:
            - main
    pull_request:
    workflow_dispatch:

jobs:
    lint-central_server:
        runs-on: ubuntu-latest
        env:
            target_dirs: ./psautomater ./tests
            UV_CACHE_DIR: /tmp/.uv-cache

        strategy:
            matrix:
                python-versions: [3.14]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v5
              with:
                  version: "0.11.1"

            - name: Set up Python ${{ matrix.python-version }}
              run: uv python install ${{ matrix.python-version }}

            - name: Restore uv cache
              uses: actions/cache@v4
              with:
                  path: ${{ env.UV_CACHE_DIR }}
                  key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
                  restore-keys: |
                      uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
                      uv-${{ runner.os }}

            - name: Install project
              run: uv sync --all-extras

            - name: Lint Codebase using pylint
              run: uv run pylint --fail-under=9 $target_dirs

            - name: Check coding style using black
              run: uv run black --check --verbose $target_dirs

            - name: Check imports organization using isort
              run: uv run isort --check-only --diff --profile black $target_dirs

            - name: Minimize uv cache
              run: uv cache prune --ci
